<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WHITE FRAME</title>
    <style>
        :root {
            --bg-outside: #FFFFFF;
            --frame-color: #F1F1F1;
            --bg-inside: #000000;
            --text-color: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-outside);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Square Construction */
        .square-container {
            width: 85vw;
            max-width: 400px;
            position: relative;
            aspect-ratio: 1 / 1;
        }

        .square-wrapper {
            width: 100%;
            height: 100%;
            background-color: var(--frame-color);
            padding: 36px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        @keyframes areaBreathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); } 
            100% { transform: scale(1); }
        }

        .breathing-inner {
            width: 100%;
            height: 100%;
            background-color: var(--bg-inside);
            position: relative;
            overflow: hidden;
            animation: areaBreathe 5s infinite ease-in-out;
            pointer-events: none;
        }

        .square-wrapper:hover {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><rect width="2" height="2" fill="white"/></svg>'), auto;
        }

        @keyframes breathe {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        }

        .pixel {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: #FFFFFF;
            pointer-events: none;
            animation: breathe 3s infinite ease-in-out;
            transform-origin: center;
        }

        /* Content Area */
        .content-area {
            text-align: center;
            color: var(--text-color);
            max-width: 500px;
            margin-top: 25px;
            padding: 0 20px;
        }

        .message-title { display: block; margin-bottom: 8px; font-weight: bold; font-size: 1.1rem; }
        .message-body { font-size: 0.85rem; line-height: 1.5; font-weight: 300; }

        /* Navigation */
        .lang-nav {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .lang-btn {
            background: #ffffff;
            border: 1px solid #000000;
            color: #000000;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .lang-btn.active { background: #000000; color: #ffffff; }

        .hamburger {
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 10px;
            user-select: none;
        }

        /* Fullscreen Menu Overlay */
        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .square-wrapper { padding: 24px; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <span class="close-menu" onclick="toggleMenu()">✕</span>
        <h3 style="font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px;">LANGUAGES</h3>
        <div class="menu-grid" id="full-lang-list"></div>
    </div>

    <div class="square-container">
        <div class="square-wrapper" id="canvas">
            <div class="breathing-inner" id="inner-canvas">
                <div class="pixel" style="top: 50%; left: 50%;"></div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div id="content">
            <span id="title" class="message-title"></span>
            <span id="body" class="message-body"></span>
        </div>
    </div>

    <nav class="lang-nav">
        <div id="priority-langs" style="display: flex; gap: 6px;"></div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>

    <script>
        const d_t = "Congratulations, you can see through the darkness.";
        const d_b = "You have discovered the first pixel of a peace that isn't handed down, but built by hand. This digital square is no longer a void, but a canvas for your perspective.";

        const translations = {
            en: { name: "EN", title: d_t, body: d_b },
            ge: { name: "GE", title: "გილოცავთ, თქვენ ხედავთ სიბნელეში...", body: "თქვენ აღმოაჩინეთ მშვიდობის პირველი პიქსელი, რომელიც არ არის ვინმეს მიერ მოცემული, არამედ საკუთარი ხელით შექმნილი." },
            ms: { name: "MS", title: "გოხიოლათ, თქვა თოლს ორწყეთ უკუმელას...", body: "თქვა ქოძირით შვიდობაშ მაართა პიქსელი, ნამუთ მიდგაინშა ვარე მოჩამილი, ვარინ დორხველი ხეთ რე აშენებული." },
            sv: { name: "SV", title: "ხოშჩამი, თქვი თოლოლ ხეკვედ მიკუმუელხოლ...", body: "თქვი ანწხერით მშვიდობის მაართა პიქსელი, მარა დემეშ მიერ მოჩამულდჷ, არამედ ხოშა ხეთ შენებულდჷ." },
            ab: { name: "AB", title: "Ишәыданыҳәალოит, шәара лашьцара шәыблахьцоит...", body: "Шәара ишәбааит аиқәшаҳарахь иазку апиқსель, шәара шәхы инапала ишәыҟаҵаз." },
            os: { name: "OS", title: "Арфӕ кӕнӕм, сымах талынгты уынут...", body: "Сымах სსარდтат фарны ფыццаგ пиკსელ, კӕцы ნიკӕი лӕвӕрд უ, ფӕლӕ უӕხი კӕუыл არӕზტ." },
            ua: { name: "UA", title: "Вітаємо, ви бачите крізь темряву...", body: "Ви знайшли перший піксель миру, який будується власноруч." },
            af: { name: "Afrikaans", title: d_t, body: d_b }, sq: { name: "Albanian", title: d_t, body: d_b }, am: { name: "Amharic", title: d_t, body: d_b }, ar: { name: "Arabic", title: d_t, body: d_b }, az: { name: "Azeri", title: d_t, body: d_b }, be: { name: "Belarusian", title: d_t, body: d_b }, bg: { name: "Bulgarian", title: d_t, body: d_b }, bn: { name: "Bengali", title: d_t, body: d_b }, hr: { name: "Croatian", title: d_t, body: d_b }, cs: { name: "Czech", title: d_t, body: d_b }, da: { name: "Danish", title: d_t, body: d_b }, nl: { name: "Dutch", title: d_t, body: d_b }, et: { name: "Estonian", title: d_t, body: d_b }, fi: { name: "Finnish", title: d_t, body: d_b }, fr: { name: "French", title: d_t, body: d_b }, de: { name: "German", title: d_t, body: d_b }, el: { name: "Greek", title: d_t, body: d_b }, hi: { name: "Hindi", title: d_t, body: d_b }, hu: { name: "Hungarian", title: d_t, body: d_b }, it: { name: "Italian", title: d_t, body: d_b }, ja: { name: "Japanese", title: d_t, body: d_b }, ko: { name: "Korean", title: d_t, body: d_b }, no: { name: "Norwegian", title: d_t, body: d_b }, pl: { name: "Polish", title: d_t, body: d_b }, pt: { name: "Portuguese", title: d_t, body: d_b }, ru: { name: "Russian", title: d_t, body: d_b }, es: { name: "Spanish", title: d_t, body: d_b }, sv_s: { name: "Swedish", title: d_t, body: d_b }, th: { name: "Thai", title: d_t, body: d_b }, tr: { name: "Turkish", title: d_t, body: d_b }, vi: { name: "Vietnamese", title: d_t, body: d_b }
        };

        const canvas = document.getElementById('canvas');
        const innerCanvas = document.getElementById('inner-canvas');
        const priorityKeys = ['en', 'ge', 'ms', 'sv', 'ab', 'os', 'ua'];

        function addPixel(clientX, clientY) {
            const innerRect = innerCanvas.getBoundingClientRect();
            const x = clientX - innerRect.left;
            const y = clientY - innerRect.top;
            if (x >= 0 && x <= innerRect.width && y >= 0 && y <= innerRect.height) {
                const pixel = document.createElement('div');
                pixel.className = 'pixel';
                pixel.style.left = (x / innerRect.width * 100) + '%';
                pixel.style.top = (y / innerRect.height * 100) + '%';
                innerCanvas.appendChild(pixel);
            }
        }

        canvas.addEventListener('mousedown', (e) => addPixel(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => addPixel(e.touches[0].clientX, e.touches[0].clientY));

        function setLang(lang) {
            if (!translations[lang]) return;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('body').innerText = translations[lang].body;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.id === lang));
            if (document.getElementById('menu-overlay').style.display === 'flex') toggleMenu();
        }

        function toggleMenu() {
            const overlay = document.getElementById('menu-overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        // Build Navs
        const priorityContainer = document.getElementById('priority-langs');
        const gridContainer = document.getElementById('full-lang-list');

        Object.keys(translations).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'lang-btn';
            btn.dataset.id = key;
            btn.innerText = translations[key].name;
            btn.onclick = () => setLang(key);

            if (priorityKeys.includes(key)) {
                priorityContainer.appendChild(btn);
            } else {
                gridContainer.appendChild(btn);
            }
        });

        setLang('en');
    </script>
</body>
</html>

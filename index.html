<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WHITE FRAME</title>
    <style>
        :root {
            --bg-outside: #FFFFFF;
            --frame-color: #F1F1F1;
            --bg-inside: #000000;
            --text-color: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-outside);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .square-container {
            width: 85vw;
            max-width: 420px;
            position: relative;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .square-wrapper {
            width: 100%;
            height: 100%;
            background-color: var(--frame-color);
            padding: 36px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        @keyframes areaBreathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); } 
            100% { transform: scale(1); }
        }

        .breathing-inner {
            width: 100%;
            height: 100%;
            background-color: var(--bg-inside);
            position: relative;
            overflow: hidden;
            animation: areaBreathe 5s infinite ease-in-out;
            pointer-events: none;
        }

        .square-wrapper:hover {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4"><rect width="2" height="2" fill="white"/></svg>'), auto;
        }

        @keyframes breathe {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        }

        .pixel {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: #FFFFFF;
            pointer-events: none;
            animation: breathe 3s infinite ease-in-out;
            transform-origin: center;
            z-index: 10;
        }

        .content-area {
            text-align: center;
            color: var(--text-color);
            max-width: 500px;
            margin-top: 25px;
            padding: 0 20px;
        }

        .message-title {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .message-body {
            font-size: 0.85rem;
            line-height: 1.5;
            font-weight: 300;
        }

        .lang-nav {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 20px 40px 20px;
            overflow-y: auto; /* Allows scrolling if list is too long */
            max-height: 150px;
        }

        .lang-btn {
            background: #ffffff;
            border: 1px solid #000000;
            color: #000000;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .lang-btn.active {
            background: #000000;
            color: #ffffff;
        }

        @media (max-width: 600px) {
            .square-wrapper { padding: 24px; }
            .square-container { width: 75vw; }
            .content-area { margin-top: 15px; }
        }
    </style>
</head>

            </div>
        </div>
    </div>

    <div class="content-area">
        <div id="content">
            <span id="title" class="message-title"></span>
            <span id="body" class="message-body"></span>

        const canvas = document.getElementById('canvas');
        const innerCanvas = document.getElementById('inner-canvas');

        function addPixel(clientX, clientY) {
            const innerRect = innerCanvas.getBoundingClientRect();
            const x = clientX - innerRect.left;
            const y = clientY - innerRect.top;

            if (x >= 0 && x <= innerRect.width && y >= 0 && y <= innerRect.height) {
                const pixel = document.createElement('div');
                pixel.className = 'pixel';
                pixel.style.left = (x / innerRect.width * 100) + '%';
                pixel.style.top = (y / innerRect.height * 100) + '%';
                const duration = (Math.random() * 2 + 2).toFixed(2);
                pixel.style.animationDuration = `${duration}s`;
                pixel.style.animationDelay = `${(Math.random() * 2).toFixed(2)}s`;
                innerCanvas.appendChild(pixel);
            }
        }

        canvas.addEventListener('mousedown', (e) => addPixel(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            addPixel(touch.clientX, touch.clientY);
        }, { passive: false });

        function setLang(lang) {
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('body').innerText = translations[lang].body;
            const content = document.getElementById('content');
            content.style.direction = (lang === 'ar' || lang === 'he') ? 'rtl' : 'ltr';
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.id === lang);
            });
        }

            btn.dataset.id = lang;
            btn.innerText = translations[lang].name;
            btn.onclick = () => setLang(lang);
            btnContainer.appendChild(btn);
        });
